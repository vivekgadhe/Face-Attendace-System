<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Attendance</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            text-align: center; 
            font-family: Arial, sans-serif;
            background-image: url('/static/pexels-pixelcop-2680270.jpg'); /* Use relative path for local image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        video { 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid black; 
            border-radius: 5px;
        }
        canvas { display: none; }
        button { padding: 10px 20px; margin-top: 15px; cursor: pointer; border-radius: 5px; }
        #response { font-weight: bold; margin-top: 15px; font-size: 18px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Face Recognition System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/upload">Upload</a></li>
                    <li class="nav-item"><a class="nav-link" href="/recognition">Recognize</a></li>
                    <li class="nav-item"><a class="nav-link" href="/attendance">Attendance</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5 text-center">
        <h2>Capture Photo & Mark Attendance</h2>
        <video id="video" autoplay></video>
        <canvas id="canvas"></canvas>
        <br>
        <button onclick="capturePhoto()" class="btn btn-success">Capture Photo</button>
        <button onclick="sendToFlask()" class="btn btn-primary">Mark Attendance</button>
        <h3 id="response"></h3>
    </div>

    <div class="text-">
        <a href="{{ url_for('logout') }}" class="btn btn-danger">🚪 Logout</a>
    </div>
    
    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // Start Webcam Stream
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => {
                console.error("❌ Camera error:", err);
                alert("⚠️ Could not access the camera. Please check your camera settings.");
            });

        let base64Image = "";

        // Capture Photo & Convert to Base64
        function capturePhoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            base64Image = canvas.toDataURL("image/jpeg"); // Convert to Base64
            alert("📸 Photo Captured! Click 'Mark Attendance' to send.");
        }

        // Send Image to Flask API
        function sendToFlask() {
            if (!base64Image) {
                alert("⚠️ Please capture a photo first!");
                return;
            }

            console.log("📤 Sending Base64 image to Flask...");

            fetch("/recognize", {  // Relative URL, adjust this if you are deploying it to a different domain
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: base64Image })
            })
            .then(response => response.json())  // Parse response as JSON
            .then(data => {
                console.log("✅ Flask Response:", data);

                if (data.message) {
                    document.getElementById("response").innerText = "✅ " + data.message;
                } else if (data.error) {
                    document.getElementById("response").innerText = "❌ Error: " + data.error;
                } else {
                    document.getElementById("response").innerText = "⚠️ Unexpected response: " + JSON.stringify(data);
                }
            })
            .catch(error => {
                console.error("❌ Fetch Error:", error);
                document.getElementById("response").innerText = "⚠️ Network error: Check if Flask is running!";
            });
        }
    </script>
</body>
</html>
